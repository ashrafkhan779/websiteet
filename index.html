<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ET International DMCC — Gas &amp; Steam Turbine Spare Parts Supplier, Dubai</title>
<meta name="description" content="ET International DMCC supplies OEM-equivalent spare parts and technical solutions for heavy-duty gas and steam turbines. ISO 9001:2015 certified. Dubai, UAE.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ET INTERNATIONAL — DESIGN TOKENS
   ============================================================ */
:root{
  --void:#080B10; --surface:#0F1620; --surface-raised:#16202C;
  --steel:#243140; --steel-light:#8695A6; --white:#F2F5F8;
  --cyan:#2FC6E0; --cyan-dim:#1A7C8E; --heat:#E2622A;

  --font-display:'Manrope',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;

  --ease:cubic-bezier(.22,1,.36,1);
  --dur-fast:180ms; --dur-base:320ms; --dur-slow:700ms;

  --max:1280px; --gutter:24px; --margin:20px;
  --sec-y:120px;
}
@media (max-width:860px){ :root{ --sec-y:72px; } }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--void); color:var(--white);
  font-family:var(--font-body); font-size:16px; line-height:1.65;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
img,svg{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--cyan);outline-offset:3px;border-radius:2px}

/* Type */
.display-xl{font-family:var(--font-display);font-weight:800;font-size:clamp(44px,6vw,76px);line-height:1.04;letter-spacing:-.03em}
.display-l{font-family:var(--font-display);font-weight:700;font-size:clamp(34px,4vw,52px);line-height:1.1;letter-spacing:-.03em}
h2,.h2{font-family:var(--font-display);font-weight:700;font-size:clamp(26px,2.6vw,36px);line-height:1.15;letter-spacing:-.02em}
h3,.h3{font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.3;letter-spacing:-.01em}
.body-l{font-size:18px;color:#C7D2DD;max-width:68ch}
p{max-width:68ch;color:#C7D2DD}
.mono{font-family:var(--font-mono);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.12em}
.eyebrow{font-family:var(--font-mono);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--cyan);display:block;margin-bottom:14px}
.caption{font-size:14px;color:var(--steel-light)}
.dim{color:var(--steel-light)}

/* Layout */
.wrap{max-width:var(--max);margin-inline:auto;padding-inline:var(--margin)}
.section{padding-block:var(--sec-y)}
.section--line{border-top:1px solid var(--steel)}
.sec-head{margin-bottom:48px;max-width:760px}
.sec-head p{margin-top:16px}
.grid{display:grid;gap:var(--gutter)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
@media (max-width:980px){.cols-3,.cols-4{grid-template-columns:repeat(2,1fr)}}
@media (max-width:620px){.cols-2,.cols-3,.cols-4{grid-template-columns:1fr}}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  text-transform:uppercase;letter-spacing:.12em;
  padding:14px 22px;border-radius:2px;border:1px solid var(--cyan);
  background:var(--cyan);color:var(--void);cursor:pointer;
  transition:background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease),transform var(--dur-fast) var(--ease);
}
.btn:hover{background:#5FDCF0;border-color:#5FDCF0;transform:translateY(-1px)}
.btn--ghost{background:transparent;color:var(--white);border-color:var(--steel)}
.btn--ghost:hover{background:var(--surface-raised);border-color:var(--cyan);color:var(--white)}
.btn--sm{padding:10px 16px}
.btn[disabled]{opacity:.4;pointer-events:none}
.link-c{color:var(--cyan);font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em}
.link-c:hover{text-decoration:underline;text-underline-offset:4px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--steel);border-radius:4px;padding:28px;transition:border-color var(--dur-base) var(--ease),background var(--dur-base) var(--ease)}
.card:hover{border-color:var(--cyan-dim);background:var(--surface-raised)}

/* Reveal */
.rv{opacity:0;transform:translateY(16px);transition:opacity var(--dur-slow) var(--ease),transform var(--dur-slow) var(--ease)}
.rv.in{opacity:1;transform:none}

/* ============ HEADER ============ */
.hdr{position:fixed;inset:0 0 auto;z-index:60;transition:background var(--dur-base) var(--ease),border-color var(--dur-base) var(--ease),backdrop-filter var(--dur-base)}
.hdr{border-bottom:1px solid transparent}
.hdr.solid{background:rgba(8,11,16,.82);backdrop-filter:blur(14px);border-bottom-color:var(--steel)}
.hdr-in{max-width:var(--max);margin-inline:auto;padding:0 var(--margin);height:76px;display:flex;align-items:center;gap:32px}
.logo{display:flex;align-items:baseline;gap:8px;font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:-.02em}
.logo b{color:var(--cyan)}
.logo span{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;color:var(--steel-light);text-transform:uppercase}
.nav{display:flex;gap:26px;margin-left:auto}
.nav a{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#C7D2DD;padding:6px 0;position:relative}
.nav a::after{content:"";position:absolute;left:0;right:100%;bottom:0;height:1px;background:var(--cyan);transition:right var(--dur-base) var(--ease)}
.nav a:hover::after,.nav a.active::after{right:0}
.nav a.active{color:var(--white)}
.hdr .btn{flex:none}
.burger{display:none;margin-left:auto;background:none;border:1px solid var(--steel);border-radius:2px;padding:10px;cursor:pointer}
.burger span{display:block;width:18px;height:1.5px;background:var(--white);margin:3px 0}
@media (max-width:1080px){ .nav,.hdr>.hdr-in>.btn{display:none} .burger{display:block} }

/* Mobile menu */
.mm{position:fixed;inset:0;z-index:70;background:var(--void);transform:translateX(100%);transition:transform var(--dur-base) var(--ease);display:flex;flex-direction:column;padding:24px var(--margin)}
.mm.open{transform:none}
.mm-top{display:flex;align-items:center;justify-content:space-between;height:52px}
.mm nav{display:flex;flex-direction:column;gap:4px;margin-top:24px}
.mm nav a{font-family:var(--font-display);font-weight:700;font-size:26px;padding:12px 0;border-bottom:1px solid var(--steel)}
.mm-foot{margin-top:auto;padding-top:24px;border-top:1px solid var(--steel);display:grid;gap:12px}
.close{background:none;border:1px solid var(--steel);border-radius:2px;width:40px;height:40px;cursor:pointer;color:var(--white)}

/* ============ HERO ============ */
.hero{position:relative;min-height:100svh;display:flex;align-items:center;padding-top:76px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:
  radial-gradient(1000px 620px at 72% 46%, rgba(47,198,224,.13), transparent 62%),
  radial-gradient(700px 460px at 78% 62%, rgba(226,98,42,.07), transparent 60%),
  linear-gradient(180deg,#080B10 0%,#0C121B 55%,#080B10 100%);}
.hero-grid{position:absolute;inset:0;opacity:.30;
  background-image:linear-gradient(var(--steel) 1px,transparent 1px),linear-gradient(90deg,var(--steel) 1px,transparent 1px);
  background-size:88px 88px;
  -webkit-mask-image:radial-gradient(circle at 70% 50%,#000 0%,transparent 72%);
  mask-image:radial-gradient(circle at 70% 50%,#000 0%,transparent 72%);}
.hero-in{position:relative;z-index:2;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;width:100%}
@media (max-width:1080px){.hero-in{grid-template-columns:1fr}.hero-art{order:-1}}
.hero h1{margin:10px 0 22px}
.hero h1 em{font-style:normal;color:var(--cyan)}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin:32px 0 26px}
.trust-line{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;color:var(--steel-light);text-transform:uppercase;line-height:2}
.scroll-ind{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px}
.scroll-ind .mono{color:var(--steel-light);font-size:10px}
.scroll-ind i{display:block;width:1px;height:44px;background:linear-gradient(var(--cyan),transparent);animation:drop 2.4s var(--ease) infinite}
@keyframes drop{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
@media (max-width:1080px){.scroll-ind{display:none}}

.rotor{animation:spin 26s linear infinite;transform-origin:200px 200px}
@keyframes spin{to{transform:rotate(360deg)}}
.callout line,.callout circle{stroke:var(--cyan);fill:none}
.callout text{font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;fill:var(--steel-light);text-transform:uppercase}
.draw{stroke-dasharray:200;stroke-dashoffset:200;animation:draw 1.1s var(--ease) forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.fade-in{opacity:0;animation:fi .8s var(--ease) forwards}
@keyframes fi{to{opacity:1}}

/* ============ TRUST BAR ============ */
.trust{border-block:1px solid var(--steel);background:var(--surface)}
.trust-in{display:grid;grid-template-columns:repeat(5,1fr)}
.trust-item{padding:26px 22px;border-left:1px solid var(--steel);display:flex;gap:12px;align-items:flex-start}
.trust-item:first-child{border-left:0}
.trust-item .mono{color:var(--white);line-height:1.5}
.tick{flex:none;width:14px;height:14px;margin-top:2px;border:1px solid var(--cyan);border-radius:1px;position:relative}
.tick::after{content:"";position:absolute;inset:3px;background:var(--cyan)}
@media (max-width:980px){.trust-in{grid-template-columns:repeat(2,1fr)}.trust-item{border-left:1px solid var(--steel);border-top:1px solid var(--steel)}}
@media (max-width:520px){.trust-in{grid-template-columns:1fr}}

/* ============ EXPLORER ============ */
.explorer{display:grid;grid-template-columns:1.25fr .75fr;gap:32px;align-items:start}
@media (max-width:980px){.explorer{grid-template-columns:1fr}}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:26px}
.tab{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;padding:10px 14px;border:1px solid var(--steel);border-radius:2px;background:transparent;color:var(--steel-light);cursor:pointer;transition:all var(--dur-fast) var(--ease)}
.tab:hover{color:var(--white);border-color:var(--cyan-dim)}
.tab.on{background:var(--surface-raised);border-color:var(--cyan);color:var(--white)}
.stage{background:var(--surface);border:1px solid var(--steel);border-radius:4px;padding:16px;position:relative}
.zone{cursor:pointer}
.zone .hit{fill:transparent}
.zone .shape{stroke:var(--steel);stroke-width:1;fill:#141E29;transition:fill var(--dur-base) var(--ease),stroke var(--dur-base) var(--ease)}
.zone:hover .shape,.zone.on .shape{stroke:var(--cyan);fill:#0F2733}
.zone.hot:hover .shape,.zone.hot.on .shape{stroke:var(--heat);fill:#241610}
.zone .zlabel{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.1em;fill:var(--steel-light);text-transform:uppercase;pointer-events:none;transition:fill var(--dur-base)}
.zone:hover .zlabel,.zone.on .zlabel{fill:var(--white)}
.panel{background:rgba(15,22,32,.86);backdrop-filter:blur(10px);border:1px solid var(--steel);border-radius:4px;padding:26px;position:sticky;top:100px}
.panel.hot{border-color:rgba(226,98,42,.5)}
.panel dl{display:grid;gap:14px;margin:18px 0}
.panel dt{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan)}
.panel.hot dt{color:var(--heat)}
.panel dd{font-size:14px;color:#C7D2DD}
.panel-cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
.hint{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel-light)}

/* Mobile explorer accordion */
.acc{border:1px solid var(--steel);border-radius:4px;overflow:hidden}
.acc-item+.acc-item{border-top:1px solid var(--steel)}
.acc-btn{width:100%;text-align:left;background:var(--surface);border:0;padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em}
.acc-btn[aria-expanded="true"]{color:var(--cyan)}
.acc-body{padding:0 18px 18px;background:var(--surface);display:none}
.acc-body.open{display:block}

/* ============ PRODUCTS ============ */
.pcard{position:relative;overflow:hidden;padding:0;display:flex;flex-direction:column}
.pcard-img{position:relative;aspect-ratio:4/3;background:linear-gradient(140deg,#131C27,#0A1119);border-bottom:1px solid var(--steel);overflow:hidden}
.pcard-img svg{position:absolute;inset:0;width:100%;height:100%;transition:transform var(--dur-slow) var(--ease)}
.pcard:hover .pcard-img svg{transform:scale(1.06)}
.pcard-img .outline{stroke:var(--cyan);fill:none;stroke-width:1;stroke-dasharray:600;stroke-dashoffset:600;transition:stroke-dashoffset 1.1s var(--ease)}
.pcard:hover .outline{stroke-dashoffset:0}
.pcard-body{padding:22px;display:flex;flex-direction:column;gap:10px;flex:1}
.pcard-body p{font-size:14px;flex:1}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel-light);border:1px solid var(--steel);border-radius:2px;padding:3px 7px}
.pcard-foot{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:0 22px 22px}
.filters{display:grid;grid-template-columns:2fr repeat(4,1fr);gap:10px;margin-bottom:32px}
@media (max-width:980px){.filters{grid-template-columns:1fr 1fr}}
@media (max-width:520px){.filters{grid-template-columns:1fr}}
.field{width:100%;background:var(--surface-raised);border:1px solid var(--steel);border-radius:2px;padding:12px 14px;font-size:14px;transition:border-color var(--dur-fast)}
.field:focus{border-color:var(--cyan);outline:none}
select.field{appearance:none;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#C7D2DD;background-image:linear-gradient(45deg,transparent 50%,var(--steel-light) 50%),linear-gradient(135deg,var(--steel-light) 50%,transparent 50%);background-position:calc(100% - 18px) 18px,calc(100% - 13px) 18px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:36px}

/* Spec table */
.spec{width:100%;border-collapse:collapse;border:1px solid var(--steel)}
.spec th,.spec td{text-align:left;padding:14px 16px;border-bottom:1px solid var(--steel);font-size:14px;vertical-align:top}
.spec th{width:38%;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--steel-light);font-weight:500;background:var(--surface)}
.spec tr:last-child th,.spec tr:last-child td{border-bottom:0}
.ph{color:var(--steel-light);font-style:italic}
.ph::after{content:" ⓘ";font-style:normal;color:var(--cyan-dim);font-size:11px}

/* Process flow */
.flow{position:relative;padding-left:34px}
.flow::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:1px;background:var(--steel)}
.flow-line{position:absolute;left:7px;top:6px;width:1px;background:var(--cyan);height:0;transition:height 1.4s var(--ease)}
.step{position:relative;padding:0 0 26px}
.step::before{content:"";position:absolute;left:-31px;top:7px;width:9px;height:9px;border:1px solid var(--cyan);background:var(--void);border-radius:1px}
.step .mono{color:var(--cyan);display:block;margin-bottom:4px}
.step p{font-size:14px;margin-top:2px}

/* Map */
.map-wrap{border:1px solid var(--steel);border-radius:4px;background:var(--surface);padding:24px;position:relative;overflow:hidden}
.arc{fill:none;stroke:var(--cyan);stroke-width:1;stroke-dasharray:4 6;animation:dash 3s linear infinite;opacity:.75}
@keyframes dash{to{stroke-dashoffset:-100}}
.dot{fill:var(--cyan)}
.hub{fill:var(--heat)}
.pulse{fill:none;stroke:var(--heat);animation:pulse 3s var(--ease) infinite}
@keyframes pulse{0%{r:4;opacity:.9}100%{r:22;opacity:0}}
.land{fill:#111A25;stroke:var(--steel);stroke-width:.7}

/* CTA band */
.band{background:linear-gradient(120deg,#0C1621,#0A1F29 60%,#0C1621);border-block:1px solid var(--steel);position:relative;overflow:hidden}
.band::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 40%,rgba(47,198,224,.09) 50%,transparent 60%);transform:translateX(-40%);animation:sweep 7s var(--ease) infinite}
@keyframes sweep{to{transform:translateX(60%)}}
.band-in{position:relative;z-index:1;display:flex;gap:32px;align-items:center;justify-content:space-between;flex-wrap:wrap}

/* ============ RFQ WIZARD ============ */
.rail{display:flex;gap:0;margin-bottom:40px;border:1px solid var(--steel);border-radius:2px;overflow:hidden}
.rail-step{flex:1;padding:12px 10px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel-light);background:var(--surface);border-left:1px solid var(--steel);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rail-step:first-child{border-left:0}
.rail-step.on{background:var(--surface-raised);color:var(--cyan)}
.rail-step.done{color:var(--white)}
.rail-step.done::before{content:"✓ ";color:var(--cyan)}
@media (max-width:860px){.rail-step{font-size:0;padding:10px 4px}.rail-step::after{content:"";display:block;height:3px;background:var(--steel)}.rail-step.on::after,.rail-step.done::after{background:var(--cyan)}.rail-step.done::before{content:""}}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media (max-width:700px){.fgrid{grid-template-columns:1fr}}
label.lbl{display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--steel-light);margin-bottom:7px}
label.lbl .req{color:var(--cyan)}
.err{border-color:var(--heat)!important}
.errmsg{font-size:12px;color:var(--heat);margin-top:6px;display:none}
.errmsg.show{display:block}
.li{border:1px solid var(--steel);border-radius:4px;padding:20px;background:var(--surface);margin-bottom:14px;position:relative}
.li-no{position:absolute;top:-9px;left:16px;background:var(--void);padding:0 8px;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--cyan)}
.li-del{position:absolute;top:14px;right:14px;background:none;border:1px solid var(--steel);border-radius:2px;padding:4px 9px;font-family:var(--font-mono);font-size:10px;color:var(--steel-light);cursor:pointer}
.li-del:hover{border-color:var(--heat);color:var(--heat)}
.drop{border:1px dashed var(--steel);border-radius:4px;padding:40px 24px;text-align:center;background:var(--surface);transition:all var(--dur-fast)}
.drop.over{border-color:var(--cyan);background:var(--surface-raised)}
.flist{margin-top:14px;display:grid;gap:8px}
.frow{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--steel);border-radius:2px;padding:10px 14px;background:var(--surface);font-family:var(--font-mono);font-size:11px}
.wiz-nav{display:flex;justify-content:space-between;gap:12px;margin-top:36px;padding-top:26px;border-top:1px solid var(--steel)}
.review-block{border:1px solid var(--steel);border-radius:4px;margin-bottom:14px}
.review-block h3{padding:14px 18px;border-bottom:1px solid var(--steel);background:var(--surface);font-size:14px;display:flex;justify-content:space-between;align-items:center}
.review-block .kv{display:grid;grid-template-columns:200px 1fr;gap:10px 18px;padding:18px}
.review-block .kv dt{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--steel-light);padding-top:3px}
.review-block .kv dd{font-size:14px;color:var(--white)}
@media (max-width:620px){.review-block .kv{grid-template-columns:1fr;gap:2px 0}.review-block .kv dd{margin-bottom:10px}}
.check{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--steel);border-radius:4px;padding:18px;background:var(--surface)}
.check input{margin-top:4px;accent-color:var(--cyan);width:16px;height:16px;flex:none}
.check label{font-size:14px;color:#C7D2DD}
.conf{text-align:center;padding:80px 0}
.ref{font-family:var(--font-mono);font-size:clamp(22px,4vw,34px);letter-spacing:.16em;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:2px;padding:20px 28px;display:inline-flex;gap:14px;align-items:center;background:var(--surface);margin:26px 0}
.copy{background:none;border:1px solid var(--steel);border-radius:2px;padding:6px 10px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--steel-light);cursor:pointer}
.copy:hover{border-color:var(--cyan);color:var(--cyan)}

/* Footer */
.ftr{border-top:1px solid var(--steel);background:var(--surface);position:relative;overflow:hidden}
.ftr-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1.3fr;gap:32px;padding-block:64px 40px;position:relative;z-index:1}
@media (max-width:980px){.ftr-grid{grid-template-columns:1fr 1fr}}
@media (max-width:560px){.ftr-grid{grid-template-columns:1fr}}
.ftr h4{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel-light);margin-bottom:16px;font-weight:500}
.ftr ul{list-style:none;display:grid;gap:9px}
.ftr ul a{font-size:14px;color:#C7D2DD}
.ftr ul a:hover{color:var(--cyan)}
.ftr-bot{border-top:1px solid var(--steel);padding-block:22px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;position:relative;z-index:1}
.ftr-line{position:absolute;bottom:0;left:0;right:0;height:120px;opacity:.16;pointer-events:none}
.disclaimer{font-size:11px;color:var(--steel-light);max-width:100%;border-top:1px solid var(--steel);padding-block:18px;line-height:1.7}

/* Misc */
.pagehead{padding-top:150px;padding-bottom:64px;border-bottom:1px solid var(--steel);background:radial-gradient(700px 320px at 20% 0%,rgba(47,198,224,.08),transparent 70%)}
.crumbs{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel-light);margin-bottom:18px}
.crumbs a:hover{color:var(--cyan)}
.crumbs span{color:var(--steel)}
.note{border-left:2px solid var(--cyan-dim);background:var(--surface);padding:14px 18px;font-size:13px;color:var(--steel-light);border-radius:0 2px 2px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,120%);z-index:90;background:var(--surface-raised);border:1px solid var(--cyan);border-radius:2px;padding:14px 22px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:transform var(--dur-base) var(--ease)}
.toast.on{transform:translate(-50%,0)}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
.skip{position:fixed;top:-60px;left:20px;z-index:100;background:var(--cyan);color:var(--void);padding:10px 16px;border-radius:2px;transition:top var(--dur-fast)}
.skip:focus{top:12px}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition-duration:1ms!important;scroll-behavior:auto!important}
  .rv{opacity:1;transform:none}
  .pcard-img .outline{stroke-dashoffset:0}
}
</style>

/* ============================================================
   RFQ WIZARD
   ============================================================ */
const RFQ_STEPS=["Contact","Turbine","Parts","Files","Details","Review"];
let W = null;

function newRFQ(params){
  return {
    step:0,
    contact:{name:"",company:"",job_title:"",email:"",phone:"",country:""},
    turbine:{type:"",platform:params.get("platform")||"",manufacturer:"",site_name:"",delivery_location:""},
    items:[{part_name:params.get("category")?cat(params.get("category"))?.name||"":"",part_number:"",quantity:"",unit:"pcs",required_date:"",description:""}],
    files:[],
    req:{certification:"",inspection:"",incoterms:"",comments:params.get("service")?`Service enquiry: ${params.get("service")}`:"",preferred_contact:"Email"},
    consent:false,
    prefill:{zone:params.get("zone")||"",category:params.get("category")||"",source:location.hash},
    ref:null, t0:Date.now()
  };
}

pages.rfq = (params) => {
  const draft = DRAFT.load();
  W = (draft && !params.toString()) ? draft : newRFQ(params);
  const pre = W.prefill.category||W.prefill.zone||W.turbine.platform;
  return `
<section class="pagehead"><div class="wrap">
  ${crumbs([["Home","#/"],["Request a quote"]])}
  <h1 class="display-l">Request a quote</h1>
  <p class="body-l" style="margin-top:20px">Six steps. Attach drawings if you have them — a photograph of the existing component works too. Every enquiry is reviewed by an engineer before quotation.</p>
  ${pre?`<div class="note" style="margin-top:24px">Pre-filled from your selection: ${[W.turbine.platform&&plat(W.turbine.platform)?.name, W.prefill.zone&&zone(W.prefill.zone)?.label, W.prefill.category&&cat(W.prefill.category)?.name].filter(Boolean).map(esc).join(" · ")}</div>`:""}
</div></section>
<section class="section"><div class="wrap" style="max-width:900px">
  <div class="rail" id="rail"></div>
  <div id="wizBody"></div>
</div></section>`;
};

function renderWizard(){
  const rail=q("#rail"), body=q("#wizBody"); if(!rail||!body) return;
  rail.innerHTML = RFQ_STEPS.map((s,i)=>`<div class="rail-step ${i===W.step?"on":""} ${i<W.step?"done":""}"><span>${i+1}. ${s}</span></div>`).join("");
  body.innerHTML = [step1,step2,step3,step4,step5,step6][W.step]();
  bindWizard();
  body.scrollIntoView({block:"start",behavior:"smooth"});
}

       POST /api/rfq/:id/files → private bucket, signed URLs, virus scan
       → notify sales@etinternational.ae with the reference number
       → acknowledgement email to W.contact.email
     Stubbed here — the payload below is the exact contract.
  ------------------------------------------------------------------- */
  console.log("RFQ payload →", JSON.stringify({
    reference:W.ref, status:"new", contact:W.contact, turbine:W.turbine,
    line_items:W.items, files:W.files.map(f=>({name:f.name,size:f.size,type:f.type})),

/* ---- wizard binding ---- */
function bindWizard(){
  const B=q("#wizBody"); if(!B) return;

  B.querySelector("[data-back]")?.addEventListener("click",()=>{ collect(); W.step--; DRAFT.save(W); renderWizard(); });
  B.querySelector("[data-next]")?.addEventListener("click",()=>{
    collect();
    if(!validate()) return;
    DRAFT.save(W);
    if(W.step===5){ submitRFQ(); return; }
    W.step++; renderWizard();
  });
  B.querySelectorAll("[data-goto]").forEach(b=>b.addEventListener("click",()=>{ W.step=+b.dataset.goto; renderWizard(); }));

  B.querySelector("[data-add-item]")?.addEventListener("click",()=>{
    collect(); W.items.push({part_name:"",part_number:"",quantity:"",unit:"pcs",required_date:"",description:""}); renderWizard();
  });
  B.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    collect(); W.items.splice(+b.dataset.del,1); renderWizard();
  }));

  const drop=B.querySelector("#drop");
  if(drop){
    const input=B.querySelector("#fileIn");
    B.querySelector("#pick").addEventListener("click",()=>input.click());
    input.addEventListener("change",e=>addFiles(e.target.files));
    ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over")}));
    ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("over")}));
    drop.addEventListener("drop",e=>addFiles(e.dataTransfer.files));
    B.querySelectorAll("[data-delfile]").forEach(b=>b.addEventListener("click",()=>{ W.files.splice(+b.dataset.delfile,1); renderWizard(); }));
  }
}

function addFiles(list){
  const ok=/\.(pdf|xlsx?|docx?|jpe?g|png)$/i;
  [...list].forEach(f=>{
    if(W.files.length>=10) return toast("Maximum 10 files");
    if(!ok.test(f.name)) return toast(`${f.name}: file type not accepted`);
    if(f.size>10*1024*1024) return toast(`${f.name}: over 10 MB`);
    W.files.push({name:f.name,size:f.size,type:f.type});
  });
  renderWizard();
}

function collect(){
  const g=id=>q("#"+id)?.value.trim()??"";
  if(W.step===0) W.contact={name:g("f_name"),company:g("f_company"),job_title:g("f_title"),email:g("f_email"),phone:g("f_phone"),country:g("f_country")};
  if(W.step===1) W.turbine={type:g("f_ttype"),platform:g("f_plat"),manufacturer:g("f_manu"),site_name:g("f_site"),delivery_location:g("f_deliv")};
  if(W.step===2) document.querySelectorAll("#items .li").forEach((el,i)=>{
    el.querySelectorAll(".li-f").forEach(f=>{ W.items[i][f.dataset.k]=f.value.trim(); });
  });
  if(W.step===4) W.req={certification:g("f_cert"),inspection:g("f_insp"),incoterms:g("f_inco"),comments:g("f_comm"),preferred_contact:g("f_pref")};
  if(W.step===5) W.consent=!!q("#consent")?.checked;
}

function fail(id,msg){
  const el=q("#"+id), m=document.querySelector(`.errmsg[data-for="${id}"]`);
  el?.classList.add("err"); if(m){ m.textContent=msg; m.classList.add("show"); }
  return false;
}
function clearErrs(){ document.querySelectorAll(".err").forEach(e=>e.classList.remove("err")); document.querySelectorAll(".errmsg.show").forEach(e=>e.classList.remove("show")); }

function validate(){
  clearErrs(); let ok=true;
  const need=(id,msg="Required")=>{ if(!q("#"+id)?.value.trim()){ fail(id,msg); ok=false; } };
  if(W.step===0){
    ["f_name","f_company","f_email","f_phone","f_country"].forEach(id=>need(id));
    const e=q("#f_email")?.value.trim();
    if(e && !/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e)){ fail("f_email","Enter a valid work email address"); ok=false; }
  }
  if(W.step===1){ ["f_ttype","f_plat","f_deliv"].forEach(id=>need(id)); }
  if(W.step===2){
    document.querySelectorAll("#items .li").forEach((el,i)=>{
      el.querySelectorAll(".li-f").forEach(f=>{
        if((f.dataset.k==="part_name"||f.dataset.k==="quantity") && !f.value.trim()){
          f.classList.add("err");
          const m=el.querySelector(`.errmsg[data-for="li${i}_${f.dataset.k}"]`); if(m) m.classList.add("show");
          ok=false;
        }
      });
    });
    if(!ok) toast("Complete every line item, or remove it");
  }
  if(W.step===5 && !q("#consent")?.checked){
    document.querySelector('.errmsg[data-for="consent"]')?.classList.add("show"); ok=false;
  }
  if(!ok && W.step!==2) toast("Check the highlighted fields");
  return ok;
}

  root.querySelectorAll("[data-plat]").forEach(b=>b.addEventListener("click",()=>{ EX.platform=b.dataset.plat; EX.zone=null; renderExplorer(); }));

  if(!isNarrow){
    root.querySelectorAll(".zone").forEach(g=>{

    }));
  }
  observe(root);
}

        <a class="btn btn--ghost btn--sm" href="#/request-a-quote">Describe your requirement</a></div>`;
    q("#pcount").textContent = `${out.length} of ${CATEGORIES.length} categories`;
    const u=new URLSearchParams(); if(s)u.set("q",s); if(c)u.set("category",c); if(p)u.set("platform",p); if(z)u.set("zone",z); if(sv)u.set("service",sv);
    history.replaceState(null,"",`#/products${u.toString()?"?"+u:""}`);
    grid.querySelectorAll(".rv").forEach(e=>e.classList.add("in"));
  };
  ids.forEach(id=>{ const el=q("#"+id); el.addEventListener(el.tagName==="SELECT"?"change":"input",apply); });
  apply();
}

/* ============================================================
   ROUTER + CHROME
   ============================================================ */
function route(){
  const raw = location.hash.replace(/^#/,"") || "/";
  const [path,qs] = raw.split("?");
  const params = new URLSearchParams(qs||"");
  const seg = path.split("/").filter(Boolean);
  let html, title="ET International DMCC";

  if(seg.length===0){ html=pages.home(); title="ET International DMCC — Gas & Steam Turbine Spare Parts Supplier, Dubai"; }
  else if(seg[0]==="about"){ html=pages.about(); title="About ET International DMCC — Turbine Component Supply"; }
  else if(seg[0]==="products" && seg[1]){ const c=cat(seg[1]); html=pages.productDetail(seg[1]); title=c?`${c.name} — ET International DMCC`:"Not found"; }
  else if(seg[0]==="products"){ html=pages.products(params); title="Turbine Spare Parts & Components — ET International DMCC"; }
  else if(seg[0]==="turbine-platforms" && seg[1]){ const p=plat(seg[1]); html=pages.platformDetail(seg[1]); title=p?`${p.name} Turbine Parts — ET International DMCC`:"Not found"; }
  else if(seg[0]==="turbine-platforms"){ html=pages.platforms(); title="Turbine Platforms — ET International DMCC"; }
  else if(seg[0]==="services" && seg[1]){ const s=SERVICES.find(x=>x.slug===seg[1]); html=pages.serviceDetail(seg[1]); title=s?`${s.name} — ET International DMCC`:"Not found"; }
  else if(seg[0]==="services"){ html=pages.services(); title="Services & Capabilities — ET International DMCC"; }
  else if(seg[0]==="quality"){ html=pages.quality(); title="Quality & Certification — ET International DMCC"; }
  else if(seg[0]==="industries"){ html=pages.industries(); title="Industries We Support — ET International DMCC"; }
  else if(seg[0]==="request-a-quote"){ html=pages.rfq(params); title="Request a Quote — ET International DMCC"; }
  else if(seg[0]==="contact"){ html=pages.contact(); title="Contact — ET International DMCC"; }
  else if(seg[0]==="privacy"){ html=pages.privacy(); title="Privacy Policy — ET International DMCC"; }
  else { html=pages.notFound(); title="Page not found — ET International DMCC"; }

  document.title=title;
  q("#main").innerHTML=html;

  const cur="#"+(path==="/"?"/":path.replace(/\/$/,""));
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("active", a.getAttribute("href")===cur || (seg[0] && a.getAttribute("href")==="#/"+seg[0])));

  if(seg.length===0) renderExplorer();
  if(seg[0]==="products" && !seg[1]) bindProducts(params);
  if(seg[0]==="request-a-quote") renderWizard();
  bindGlobal();
  observe(document);
  if(!location.hash.includes("#explorer")) window.scrollTo(0,0);
  onScroll();
}

function bindGlobal(){
  document.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",async()=>{
    try{ await navigator.clipboard.writeText(b.dataset.copy); toast("Copied to clipboard"); }
    catch{ toast("Copy unavailable in this context"); }
  }));
  document.querySelectorAll("[data-spec-sheet]").forEach(b=>b.addEventListener("click",()=>toast("Specification sheet — awaiting upload in admin")));
  ["quickForm","quickFormInline","contactForm"].forEach(id=>{
    const f=document.getElementById(id); if(!f) return;
    f.addEventListener("submit",e=>{
      e.preventDefault();
      if(f.website?.value) return;
      const bad=[...f.querySelectorAll("[required]")].filter(el=>el.type==="checkbox"?!el.checked:!el.value.trim());
      bad.forEach(el=>el.classList.add("err"));
      if(bad.length){ toast("Complete the required fields"); return; }
      /* API BOUNDARY: POST /api/enquiries → enquiries collection + notify sales@ */
      console.log("Enquiry payload →", Object.fromEntries(new FormData(f)));
      f.innerHTML=`<div style="text-align:center;padding:20px 0"><p class="mono" style="color:var(--cyan)">Enquiry sent</p><p style="font-size:14px;margin-top:10px">We'll come back to you by email. For a full requirement, use the <a class="link-c" href="#/request-a-quote" style="font-size:13px">RFQ form</a>.</p></div>`;
    });
    f.querySelectorAll("input,textarea").forEach(el=>el.addEventListener("input",()=>el.classList.remove("err")));
  });
}

/* Reveal + flow line */
let io;
function observe(root){
  io = io || new IntersectionObserver(es=>es.forEach(e=>{
    if(!e.isIntersecting) return;
    e.target.classList.add("in");
    const fl=e.target.querySelector?.("[data-flowline]");
    if(fl) setTimeout(()=>{ fl.style.height=(e.target.offsetHeight-12)+"px"; },200);
    io.unobserve(e.target);
  }),{threshold:.12,rootMargin:"0px 0px -40px"});
  root.querySelectorAll(".rv:not(.in)").forEach(el=>io.observe(el));
  document.querySelectorAll(".flow").forEach(el=>io.observe(el));
}

function onScroll(){ q("#hdr").classList.toggle("solid", window.scrollY>80 || !location.hash.match(/^#\/?$/)); }

let tt;
function toast(msg){
  const t=q("#toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("on"),2600);
}

/* Boot */
q("#nav").innerHTML=NAV.map(([n,h])=>`<a href="${h}">${n}</a>`).join("");
q("#mmNav").innerHTML=NAV.map(([n,h])=>`<a href="${h}">${n}</a>`).join("");
q("#ftr").innerHTML=footer();

const mm=q("#mm");
const openMM=()=>{ mm.classList.add("open"); mm.setAttribute("aria-hidden","false"); document.body.style.overflow="hidden"; mm.querySelector("a")?.focus(); };
const closeMM=()=>{ mm.classList.remove("open"); mm.setAttribute("aria-hidden","true"); document.body.style.overflow=""; };
q("#burger").addEventListener("click",openMM);
q("#mmClose").addEventListener("click",closeMM);
mm.addEventListener("click",e=>{ if(e.target.tagName==="A") closeMM(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeMM(); });

window.addEventListener("hashchange",route);
window.addEventListener("scroll",onScroll,{passive:true});
window.addEventListener("resize",()=>{ if(location.hash.replace(/^#/,"").split("?")[0].replace(/\//g,"")==="") renderExplorer(); });
route();
</script>
